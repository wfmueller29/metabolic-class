# enter the datasets below copying and pasting this template for each 
# dataset.
#
# 'path' should contain the path to the dataframe relative to 
# the home directory. 
# 'outcome' should contain the outcome variable for the
# dataframe. There should only be one outcome variable per dataset.
# 'age_var' should contain the name of the age variable that will be modelled.
# If there are multiple be sure to comma separate them. 
# 'dummy' should contain the names of the variables that should be converted
# to dummy variable. Any factor variable that will be used in the LCMM models 
# should be converted to a dummy variable. 
# 'factor' any variable that should be converted to a factor variable that will
# be used for later analysis.
#
# Here is an example
#
# - path: "../../01_dataset/output/main_all2.RDATA"
#   outcome: "bw"
#   age_var: ["age_wk"]
#   dummy: ["sex", "strain"]
#   numeric: ["bw", "idno", "le_wk"]
#   factor: ["cohort"]
#
- name: "slam"
  path: "../01_dataset/output/main_all2.RDATA"
  outcome: "bw"
  age_var: ["age_wk", "per_age_wk"]
  id: "idno"
  dummy: ["sex", "strain"]
  numeric: ["bw", "idno", "le_wk"]
  factor: ["cohort"]
  remove_velocity_outliers:
    execute: TRUE
    threshold: 5
    age_var: "age_wk"
  percent_change_baseline:
    execute: TRUE
    age_var: "age_wk"
    target: 30
    lower: 0
    upper: 50
    keep_before: FALSE
  sample_monthwise:
    execute: TRUE
    interval: 3
    age_var: "age_wk"
  train_test:
    execute: TRUE
    id: "idno"
    sample_by: ["sex", "strain"]
    split: .8
  sample_age_interval:
    execute: TRUE
    intervals:
      - [age_wk: "[0, 100]"]
      - [age_wk: "[0, 110]"]
      - [age_wk: "[0, 120]"]
  model:
    fixed: "~ $age_var + $age_var2 + sex_F + strain_HET3" 
    fixcov: ["sex_F", "strain_HET3"]
    mixture: "~ $age_var + $age_var2" 
    random: 
      - "~ 1"
    idiag: FALSE
    nwg: FALSE
    ng_max: 3
  labels:
    oc_name: "Body Weight"
    oc_units: "(g)"
    age_var_name: ["Age", "Relative Age"]
    age_var_units: ["(weeks)", "(%)"]
    data_name: "SLAM Body Weight"
