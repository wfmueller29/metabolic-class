# Body Weight All Mice --------------------------------------------------------
  # general name of dataset
- name: "slam" 
  # path to the dataset
  path: "../01_dataset/output/main_all2.RDATA" 
  # outcome variable we would like to model
  outcome: "bw" 
  # age variables we would like to model
  age_var: ["age_wk", "per_age_wk"] 
  # subject identifier variable
  id: "idno" 
  # Categorical variables that we will create dummy variables from
  # it is preferable to use dummy variables when modelling
  dummy: ["sex", "strain"] 
  # Variables we would like to ensure are numeric
  numeric: ["bw", "idno", "le_wk"]
  # Variable we would like to make into factor variables
  factor: ["cohort"]
  # If "execute" is true, we will subset the data for each object in list
  # "subsets". These subsetted datasets will replace the orginal dataset
  sample_subsets:
    execute: FALSE
    subsets:
      - [sex: M, strain: HET3]
      - [sex: F, strain: HET3]
      - [sex: M, strain: B6]
      - [sex: F, strain: B6]
  # If "execute" is true, we will calculate rate of change of outcome measurement
  # per "age_var" unit. If the magnitude of the rate of change is greater than 
  # "threshold", then those measurements will be considered outliers and will be 
  # removed. The original dataset will still be kept and modelled, but this 
  # will create an additional new dataset that will also be modelled. 
  remove_velocity_outliers:
    execute: FALSE
    threshold: 5
    age_var: "age_wk"
  # If "execute" is TRUE, we will create a new outcome variable that calculates,
  # the percent change from baseline. The baseline will be determined by 
  # "target". Any measurements for an individual within the interval 
  # ["lower", "upper"], will be considered as baseline values. The 
  # measurement for an individual within this interval and closest to "target"
  # will be considered baseline. We will use "age_var" to calculate the 
  # the percent change 
  percent_change_baseline:
    execute: FALSE
    age_var: "age_wk"
    target: 30
    lower: 0
    upper: 50
    keep_before: FALSE
  # If "execute" is true, we will downsample a dataset by sampling each 
  # mouse at a lower frequency. For example if each mouse was measured every
  # week, but we would only like to take the measurement every month, we would
  # set "interval" to 1, and specify the "age_var". This will only work if 
  # the "age_var" is in units of weeks
  sample_monthwise:
    execute: TRUE
    interval: 3
    age_var: "age_wk"
  # if "execute" is TRUE, we will perform a dataset split at a fraction 
  # specified by "split". We will ensure proportional sampling across the 
  # variables specificied by "sample_by". We will also ensure that each 
  # individual mouse will either be in the training or testing set, not in both.
  # This is specified by "id"
  train_test:
    execute: TRUE
    id: "idno"
    sample_by: ["sex", "strain"]
    split: .8
  # if "execute" is TRUE, we will sample our dataset at the intervals specified
  # using the variable specified before the ":"
  sample_age_interval:
    execute: TRUE
    intervals:
      - [age_wk: "[0, 57.50]"]
      - [age_wk: "[0, 86.25]"]
      - [age_wk: "[0, 103.50]"]
      - [age_wk: "(0, 57.50)"]
      - [age_wk: "[57.50,86.25)"]
      - [age_wk: "[86.25,103.50)"]
      - [age_wk: "[103.50,Inf)"]
      - [age_wk: "[57.50,103.50]"]
  # These are the models we would like to run. This is called in
  # 03_model/model.R. "$age_var" will be replaced by the variables specified
  # early by "age_var". It is important to included the dummy variable names
  # in the model, not the categorical variable names
  model:
    fixed: "~ $age_var + $age_var2 + sex_F + strain_HET3" 
    fixcov: ["sex_F", "strain_HET3"]
    mixture: "~ $age_var + $age_var2" 
    random: 
      - "~ 1"
      - "~ 1 + $age_var"
      - "~ 1 + $age_var + $age_var2"
    ng_max: 3
    idiag: FALSE
    nwg: FALSE
  # this is how the data will be resampled to test certain hypothesis.
  # We need to add "_ns" to our age variable because it has gone through the
  # prep_hlme function
  prediction_data:
    filter_interval:
      intervals:
        - [age_wk_ns: "(0, 57.50)"]
        - [age_wk_ns: "[57.50,86.25)"]
        - [age_wk_ns: "[86.25,103.50)"]
        - [age_wk_ns: "[103.50,Inf)"]
        - [age_wk_ns: "[57.50,103.50]"]
      names:
    filter_window:
      age_var: "age_wk_ns"
      start: 0
      end: 165
      window_size_vector: [25, 50]
      step: 10
    filter_cumulative:
      age_var: "age_wk_ns"
      start_vector: [0,25,50,75]
      end: 165
      step: 25
    resample:
      age_var: "age_wk_ns"
      fraction_vector: [.75, .667, .5, .337, .25]
  # Labels are the labels of the variables
  labels:
    oc_name: "Body Weight"
    oc_units: "(g)"
    age_var_name: ["Age", "Relative Age"]
    age_var_units: ["(weeks)", "(%)"]
    data_name: "SLAM Body Weight"
  # Harmonizing the dataset
  harmonize:
    execute: TRUE
    formula: "~ age_wk + age_wk2 + sex * strain + (1|idno)"
    variable: "cohort"
