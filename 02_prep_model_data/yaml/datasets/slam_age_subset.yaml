# Body Weight Sex, Strain Subsets
- name: "slam"
  path: "../01_dataset/output/main_all2.RDATA"
  outcome: "bw"
  age_var: "age_wk"
  id: "idno"
  dummy: ["sex", "strain"]
  numeric: ["bw", "idno", "le_wk"]
  factor: ["cohort"]
  remove_velocity_outliers:
    execute: FALSE
    threshold: 5
    age_var: "age_wk"
  percent_change_baseline:
    execute: TRUE
    age_var: "age_wk"
    target: 30
    lower: 0
    upper: 50
    keep_before: FALSE
  sample_monthwise:
    execute: TRUE
    interval: 3
    age_var: "age_wk"
  train_test:
    execute: TRUE
    id: "idno"
    sample_by: ["sex", "strain"]
    split: .8
  sample_age_interval:
    execute: TRUE
    intervals:
      - [age_wk: "[0, 57.50]"]
      - [age_wk: "[0, 86.25]"]
      - [age_wk: "[0, 103.50]"]
      - [age_wk: "(0, 57.50)"]
      - [age_wk: "[57.50,86.25)"]
      - [age_wk: "[86.25,103.50)"]
      - [age_wk: "[103.50,Inf)"]
      - [age_wk: "[57.50,103.50]"]
  sample_subsets:
    execute: TRUE
    subsets:
      - [sex: M, strain: HET3]
      - [sex: F, strain: HET3]
      - [sex: M, strain: B6]
      - [sex: F, strain: B6]
  model:
    fixed: "~ age_wk + age_wk2" 
    mixture: "~ age_wk + age_wk2" 
    random: 
      - "~ 1"
      - "~ 1 + age_wk"
      - "~ 1 + age_wk + age_wk2"
    ng_max: 10
    idiag: [TRUE, FALSE]
    nwg: [TRUE, FALSE]
  prediction_data:
    filter_interval:
      intervals:
        - [age_wk_ns: "(0, 57.50)"]
        - [age_wk_ns: "[57.50,86.25)"]
        - [age_wk_ns: "[86.25,103.50)"]
        - [age_wk_ns: "[103.50,Inf)"]
        - [age_wk_ns: "[57.50,103.50]"]
      names:
    filter_window:
      age_var: "age_wk_ns"
      start: 0
      end: 165
      window_size_vector: [25, 50]
      step: 10
    filter_cumulative:
      age_var: "age_wk_ns"
      start_vector: [0,25,50,75]
      end: 165
      step: 25
    resample:
      age_var: "age_wk_ns"
      fraction_vector: [.75, .667, .5, .337, .25]
  labels:
    oc_name: "Body Weight"
    oc_units: "(g)"
    age_var_name: "Age"
    age_var_units: "(weeks)"
    data_name: "SLAM Body Weight"

