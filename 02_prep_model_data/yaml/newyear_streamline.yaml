- name: "slam"
  path: "data/deltas_blood.csv"
  outcome: "delta"
  age_var: "age_wk"
  id: "ID"
  generate_idno: TRUE
  dummy: ["sex", "strain"]
  numeric: ["delta", "lifespan",
    "natural_death", "tstart", "tstop", "status"]
  factor: ["cohort"]
  sample_age_interval:
    execute: TRUE
    intervals:
      - [age_wk: "[0, 57.50]"]
      - [age_wk: "[0, 86.25]"]
      - [age_wk: "[0, 103.50]"]
  model:
    fixed: "~ $age_var + $age_var2 + sex_F + strain_HET3 + strain_DO" 
    fixcov: ["sex_F", "strain_HET3", "strain_DO"]
    mixture: "~ $age_var + $age_var2" 
    random: 
      - "~ 1"
      - "~ 1 + $age_var"
      - "~ 1 + $age_var + $age_var2"
  labels:
    oc_name: "Blood Delta"
    oc_units: " "
    age_var_name: ["Age", "Relative Age"]
    age_var_units: ["(weeks)", "(%)"]
    data_name: "SLAM Blood Delta"


