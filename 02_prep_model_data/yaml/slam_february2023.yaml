# Body Weight All Mice --------------------------------------------------------
- name: "slam"
  path: "../01_dataset/output/main_all2.RDATA"
  outcome: "bw"
  age_var: ["age_wk", "per_age_wk"]
  id: "idno"
  dummy: ["sex", "strain"]
  numeric: ["bw", "idno", "le_wk"]
  factor: ["cohort"]
  remove_velocity_outliers:
    execute: FALSE
    threshold: 5
    age_var: "age_wk"
  percent_change_baseline:
    execute: FALSE
    age_var: "age_wk"
    target: 30
    lower: 0
    upper: 50
    keep_before: FALSE
  sample_monthwise:
    execute: TRUE
    interval: 3
    age_var: "age_wk"
  train_test:
    execute: TRUE
    id: "idno"
    sample_by: ["sex", "strain"]
    split: .8
  sample_age_interval:
    execute: TRUE
    intervals:
      - [age_wk: "[0, 57.50]"] 
      - [age_wk: "[0, 86.25]"] 
      - [age_wk: "[0, 103.50]"]  
      - [age_wk: "(0, 57.50)"] # early life
      - [age_wk: "[57.50,86.25)"] # midlife
      - [age_wk: "[86.25,103.50)"] # late life
      - [age_wk: "[103.50,Inf)"] # oldest in life
      - [age_wk: "[57.50,103.50]"] # midlife + late life
      - [per_age_wk: "(0, 50]"]
      - [per_age_wk: "(0, 75]"]
      - [per_age_wk: "(0, 90]"]
      - [per_age_wk: "(0, 50]"] # early life
      - [per_age_wk: "(50, 75]"] # midlife
      - [per_age_wk: "(75, 90]"] # late life
      - [per_age_wk: "(90, 100]"] # oldest in life
      - [per_age_wk: "(50, 90]"] # midlife + late life
  model:
    fixed: "~ $age_var + $age_var2 + sex_F + strain_HET3" 
    fixcov: ["sex_F", "strain_HET3"]
    mixture: "~ $age_var + $age_var2" 
    random: 
      - "~ 1"
      - "~ 1 + $age_var"
      - "~ 1 + $age_var + $age_var2"
  labels:
    oc_name: "Body Weight"
    oc_units: "(g)"
    age_var_name: ["Age", "Relative Age"]
    age_var_units: ["(weeks)", "(%)"]
    data_name: "SLAM Body Weight"
