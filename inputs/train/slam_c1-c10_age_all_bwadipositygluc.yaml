out_tag: slam_c1-c10_age_all_bwadipositygluc
tag_time: FALSE
plan: multicore
ncpus: 8
sample_n: FALSE
center: TRUE
scale: FALSE
complete_ng: NULL
train_ng: "complete_ng"
external_validate: FALSE
custom_palette: TRUE
palette_colors: ["#000000", "#ff2500", "#a144ff", "#0e33ff", "#00cfd2", "#ff41ff", "#ff9f23", "#b8b8b8"]
legend_labels: ["Class 1","Class 2","Class 3","Class 4","Class 5","Class 6","Class 7","Class 8"]
custom_palette_train: TRUE
palette_colors_train: ["#000000", "#ff2500", "#a144ff", "#0e33ff", "#00cfd2", "#ff41ff", "#ff9f23", "#b8b8b8"]
legend_labels_train: ["Class 1","Class 2","Class 3","Class 4","Class 5","Class 6","Class 7","Class 8"]
survival_dataset:
  path: "../00c_survival_data/output/slam_c1-c10/data/main_cat_surv.csv"
  id: "idno"
  age_death: "le_wk"
  event: "dead_censor"
individual_cox:
  - "~ Class" 
  - "~ Class + sex * strain" 
  - "~ Class + sex + strata(strain)" 
combined_cox:
  forms:
    - "~ <class+> + sex + strain"
    - "~ <probs+> + sex + strata(strain)"
    - "~ <probs+> + sex + strata(strain) + frailty(cohort)"
  tts:
    - NULL
    - NULL
    - NULL
prediction_data:
  filter_interval:
    intervals:
      - [age_wk_ns: "(0, 57.50)"]
      - [age_wk_ns: "[57.50,86.25)"]
      - [age_wk_ns: "[86.25,103.50)"]
      - [age_wk_ns: "[103.50,Inf)"]
      - [age_wk_ns: "[57.50,103.50]"]
    names:
  filter_window:
    age_var: "age_wk"
    start: 6.5 # 1.5 months
    end: 143.4 # 33 months
    window_size_vector: [26.1, 39.1, 52.1] # 6, 9, 12 months
    step: 13 # 3 months
  filter_cumulative:
    age_var: "age_wk"
    start_vector: [6.5, 19.6, 32.6, 45.62] #1.5, 4.5, 7.5, 10.5 months
    end: 143.4 # 33 months
    step: 13 # 3 months
  resample:
    age_var: "age_wk"
    fraction_vector: [.125, .25, .375, .5, .625, .75, .875, 1]
meta_dataset:
  id: "idno"
  age_var: ["age_wk", "age_wk2"] # these must be in increasing polynomial order
  covariates: ["sex", "strain"]
  covariates_dummy: ["sex_M", "strain_HET3", "sex_F", "strain_B6"]
  train_test:
    sample_by: ["sex", "strain"]
    split: .8
datasets:
- name: "slam"
  path: "../00b_dataset_mods/output/slam_c1-c10/data/slam_bw_og.csv"
  outcome: "bw"
  model:
    fixed: "~ age_wk + age_wk2 + sex_F * strain_HET3"
    fixcov: ["sex_F", "strain_HET3"]
    mixture: "~ age_wk + age_wk2" 
    random: 
      - "~ 1"
      - "~ age_wk"
      - "~ age_wk + age_wk2"
    idiag: [FALSE, TRUE]
    nwg: [FALSE, TRUE]
    ng_max: 5
  labels:
    oc_name: "Body Weight"
    oc_units: "(g)"
    age_var_name: "Age"
    age_var_units: "(weeks)"
    data_name: "SLAM Body Weight"
  harmonize:
    execute: TRUE
    formula: "~ age_wk + age_wk2 + sex * strain + (1|idno)"
    variable: "cohort"

- name: "slam"
  path: "../00b_dataset_mods/output/slam_c1-c10/data/slam_adiposity_og.csv"
  outcome: "adiposity"
  model:
    fixed: "~ age_wk + age_wk2 + sex_F * strain_HET3" 
    fixcov: ["sex_F", "strain_HET3"]
    mixture: "~ age_wk + age_wk2" 
    random: 
      - "~ 1"
      - "~ age_wk"
      - "~ age_wk + age_wk2"
    idiag: [FALSE, TRUE]
    nwg: [FALSE, TRUE]
    ng_max: 5
  labels:
    oc_name: "Adiposity"
    oc_units: "(%)"
    age_var_name: "Age"
    age_var_units: "(weeks)"
    data_name: "SLAM Adiposity"
  harmonize:
    execute: TRUE
    formula: "~ age_wk + age_wk2 + sex * strain + (1|idno)"
    variable: "cohort"

- name: "slam"
  path: "../00b_dataset_mods/output/slam_c1-c10/data/slam_gluc_og.csv"
  outcome: "gluc"
  model:
    fixed: "~ age_wk + age_wk2 + sex_F * strain_HET3" 
    fixcov: ["sex_F", "strain_HET3"]
    mixture: "~ age_wk + age_wk2" 
    random: 
      - "~ 1"
      - "~ age_wk"
      - "~ age_wk + age_wk2"
    idiag: [FALSE, TRUE]
    nwg: [FALSE, TRUE]
    ng_max: 5
  labels:
    oc_name: "Glucose"
    oc_units: "(mg/dL)"
    age_var_name: "Age"
    age_var_units: "(weeks)"
    data_name: "SLAM Glucose"
  harmonize:
    execute: TRUE
    formula: "~ age_wk + age_wk2 + sex * strain + (1|idno)"
    variable: "cohort"
