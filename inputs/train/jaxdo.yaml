# jaxdo
out_tag: 20250306_jaxdo
tag_time: FALSE
plan: multicore
ncpus: 8
sample_n: FALSE
center: TRUE
scale: FALSE
external_validate: FALSE
custom_palette: TRUE
palette_colors: ["black", "#DF536B", "#61D04F", "midnightblue",
  "#28E2E5", "#CD0BBC", "#FF991C", "gray62"]
legend_labels: ["Overweight", "Low-weight", "Mid-Weight", "High-fat",
  "Low-fat", "Mid-fat", "Decline Glucose", "Stable Glucose"]
custom_palette_train: FALSE
palette_colors_train: [ "black", "#DF536B", "#61D04F", "midnightblue",
  "#28E2E5", "#CD0BBC", "#FF991C", "gray62" ]
legend_labels_train: [ "Overweight", "Low-weight", "Mid-Weight", "High-fat",
  "Low-fat", "Mid-fat", "Decline Glucose", "Stable Glucose" ]
survival_dataset:
  path: "/Users/williammueller/programs/metabolic_class/analysis/00a_jaxdo/output/jaxdo_surv.csv"
  id: "id"
  age_death: "le_wk"
  event: "dead_censor"
individual_cox:
  - "~ Class" 
  - "~ Class + sex" 
  - "~ Class + strata(sex)" 
combined_cox:
  forms:
    - "~ <class+> + sex"
    - "~ <probs+> + sex + frailty(id)"
    - "~ <probs+> + strata(sex)"
  tts:
    - NULL
    - NULL
    - NULL
prediction_data:
  filter_interval:
    intervals:
      - [age_wk_ns: "(0, 57.50)"]
      - [age_wk_ns: "[57.50,86.25)"]
      - [age_wk_ns: "[86.25,103.50)"]
      - [age_wk_ns: "[103.50,Inf)"]
      - [age_wk_ns: "[57.50,103.50]"]
    names:
  filter_window:
    age_var: "age_wk"
    start: 6.5 # 1.5 months
    end: 143.4 # 33 months
    window_size_vector: [26.1, 39.1, 52.1] # 6, 9, 12 months
    step: 13 # 3 months
  filter_cumulative:
    age_var: "age_wk"
    start_vector: [6.5, 19.6, 32.6, 45.62] #1.5, 4.5, 7.5, 10.5 months
    end: 143.4 # 33 months
    step: 13 # 3 months
  resample:
    age_var: "age_wk"
    fraction_vector: [.75, .667, .5, .337, .25]
meta_dataset:
  id: "id"
  age_var: ["age_wk", "age_wk2"] # these must be in increasing polynomial order
  covariates: ["sex"]
  covariates_dummy: ["sex_M", "sex_F"]
  train_test:
    sample_by: ["sex"]
    split: .8
datasets:
- name: "jaxdo"
  path: "/Users/williammueller/programs/metabolic_class/analysis/00a_jaxdo/output/jaxdo_bw_gluc.csv"
  outcome: "bw"
  model:
    fixed: "~ age_wk + age_wk2 + sex_F"
    fixcov: ["sex_F"]
    mixture: "~ age_wk + age_wk2" 
    random: 
      - "~ 1"
      - "~ age_wk"
      - "~ age_wk + age_wk2"
    idiag: [FALSE, TRUE]
    nwg: [FALSE, TRUE]
    ng_max: 5
  labels:
    oc_name: "Body Weight"
    oc_units: "(g)"
    age_var_name: "Age"
    age_var_units: "(weeks)"
    data_name: "Jaxdo Body Weight"
  harmonize:
    execute: TRUE
    formula: "~ age_wk + age_wk2 + sex + (1|id)"
    variable: "generation"

