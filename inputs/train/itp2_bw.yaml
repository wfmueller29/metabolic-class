out_tag: 20250426_itp_C2010_C2011_C2013_C2016_controls_cohort
tag_time: FALSE
plan: multicore
ncpus: 7
sample_n: FALSE
center: TRUE
scale: FALSE
complete_ng: NULL
train_ng: "complete_ng"
external_validate: FALSE
custom_palette: FALSE
palette_colors: ["black", "#DF536B", "#61D04F", "midnightblue",
  "#28E2E5", "#CD0BBC", "#FF991C", "gray62"]
legend_labels: ["Overweight", "Low-weight", "Mid-Weight", "High-fat",
  "Low-fat", "Mid-fat", "Decline Glucose", "Stable Glucose"]
custom_palette_train: FALSE
palette_colors_train: [ "black", "#DF536B", "#61D04F", "midnightblue",
  "#28E2E5", "#CD0BBC", "#FF991C", "gray62" ]
legend_labels_train: [ "Overweight", "Low-weight", "Mid-Weight", "High-fat",
  "Low-fat", "Mid-fat", "Decline Glucose", "Stable Glucose" ]
survival_dataset:
  path: "/Users/williammueller/programs/metabolic_class/analysis/00a_itp2/output/itp_tx_control_surv.csv"
  id: "idno"
  age_death: "le_wk"
  event: "dead_censor"
individual_cox:
  - "~ Class" 
  - "~ Class + sex" 
  - "~ Class * sex" 
combined_cox:
  forms:
    - "~ <class+> + sex"
    - "~ <probs+> + sex + frailty(idno)"
    - "~ <probs+> + strata(sex)"
  tts:
    - NULL
    - NULL
    - NULL
prediction_data:
  filter_interval:
    intervals:
      - [age_wk_ns: "(13, 65)"]
      - [age_wk_ns: "[39, 21)"]
      - [age_wk_ns: "[65, 117)"]
    names:
  filter_window:
    age_var: "age_wk"
    start: 13 # 3 months
    end: 117 # 27 months
    window_size_vector: [26.1, 52.1, 78] # 6, 12, 18 months
    step: 26 # 6 months
  filter_cumulative:
    age_var: "age_wk"
    start_vector: [13, 39] # 3 and 9 months
    end: 117 # 27 months
    step: 26 # 6 months
  resample:
    age_var: "age_wk"
    fraction_vector: [.75, .667, .5, .337, .25]
meta_dataset:
  id: "idno"
  age_var: ["age_wk", "age_wk2"] # these must be in increasing polynomial order
  covariates: ["sex"]
  covariates_dummy: ["sex_M", "sex_F"]
  train_test:
    sample_by: ["sex", "site", "cohort"]
    split: .8
datasets:
- name: "slam"
  path: "/Users/williammueller/programs/metabolic_class/analysis/00a_itp2/output/itp_control_train.csv"
  outcome: "bw"
  model:
    fixed: "~ age_wk + age_wk2 + sex_F"
    fixcov: ["sex_F"]
    mixture: "~ age_wk + age_wk2" 
    random: 
      - "~ 1"
      - "~ age_wk"
      - "~ age_wk + age_wk2"
    idiag: [FALSE, TRUE]
    nwg: [FALSE, TRUE]
    ng_max: 5
  labels:
    oc_name: "Body Weight"
    oc_units: "(g)"
    age_var_name: "Age"
    age_var_units: "(weeks)"
    data_name: "SLAM Body Weight"
  harmonize:
    execute: TRUE
    formula: "~ age_wk + age_wk2 + sex + (1|idno)"
    variable: ["cohort", "site"]

