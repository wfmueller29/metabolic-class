out_tag: slam_c1-c10_age_het3_bwfatgluc
tag_time: FALSE
plan: multicore
ncpus: 8
sample_n: FALSE
center: TRUE
scale: FALSE
complete_ng: NULL
train_ng: "complete_ng"
external_validate: FALSE
custom_palette: TRUE
palette_colors: ["#000000", "#ff2500", "#a144ff", "#ff9f23", "#0e33ff", "#00cfd2", "#ff41ff", "#00b12d", "#b8b8b8", "#ff9f23"]
legend_labels: ["Class 1","Class 2","Class 3", "Class9", "Class 4","Class 5","Class 6", "Class 10", "Class 8","Class 7"]
custom_palette_train: TRUE
palette_colors_train: ["#000000", "#ff2500", "#a144ff", "#ff9f23", "#0e33ff", "#00cfd2", "#ff41ff", "#00b12d", "#b8b8b8", "#ff9f23"]
legend_labels_train: ["Class 1","Class 2","Class 3", "Class9", "Class 4","Class 5","Class 6", "Class 10", "Class 8","Class 7"]
survival_dataset:
  path: "../00c_survival_data/output/slam_c1-c10/data/main_cat_surv.csv"
  id: "idno"
  age_death: "le_wk"
  event: "dead_censor"
individual_cox:
  - "~ Class" 
  - "~ Class + sex" 
  - "~ Class + sex" 
combined_cox:
  forms:
    - "~ <class+> + sex"
    - "~ <probs+> + frailty(idno) + sex"
    - "~ <probs+> + sex"
  tts:
    - NULL
    - NULL
    - NULL
prediction_data:
  filter_interval:
    intervals:
      - [age_wk_ns: "(0, 57.50)"]
      - [age_wk_ns: "[57.50,86.25)"]
      - [age_wk_ns: "[86.25,103.50)"]
      - [age_wk_ns: "[103.50,Inf)"]
      - [age_wk_ns: "[57.50,103.50]"]
    names:
  filter_window:
    age_var: "age_wk"
    start: 6.5 # 1.5 months
    end: 143.4 # 33 months
    window_size_vector: [26.1, 39.1, 52.1] # 6, 9, 12 months
    step: 13 # 3 months
  filter_cumulative:
    age_var: "age_wk"
    start_vector: [6.5, 19.6, 32.6, 45.62] #1.5, 4.5, 7.5, 10.5 months
    end: 143.4 # 33 months
    step: 13 # 3 months
  resample:
    age_var: "age_wk"
    fraction_vector: [.125, .25, .375, .5, .625, .75, .875, 1]
meta_dataset:
  id: "idno"
  age_var: ["age_wk", "age_wk2"] # these must be in increasing polynomial order
  covariates: ["sex"]
  covariates_dummy: ["sex_M", "sex_F"]
  train_test:
    sample_by: ["sex"]
    split: .8
datasets:
- name: "slam"
  path: "../00b_dataset_mods/output/slam_c1-c10/data/slam_bw_og_HET3.csv"
  outcome: "bw"
  model:
    fixed: "~ age_wk + age_wk2 + sex_F"
    fixcov: ["sex_F"]
    mixture: "~ age_wk + age_wk2" 
    random: 
      - "~ 1"
      - "~ age_wk"
      - "~ age_wk + age_wk2"
    idiag: [FALSE, TRUE]
    nwg: [FALSE, TRUE]
    ng_max: 5
  labels:
    oc_name: "Body Weight"
    oc_units: "(g)"
    age_var_name: "Age"
    age_var_units: "(weeks)"
    data_name: "SLAM Body Weight"
  harmonize:
    execute: TRUE
    formula: "~ age_wk + age_wk2 + sex + (1|idno)"
    variable: "cohort"

- name: "slam"
  path: "../00b_dataset_mods/output/slam_c1-c10/data/slam_fat_og_HET3.csv"
  outcome: "fat"
  model:
    fixed: "~ age_wk + age_wk2 + sex_F"
    fixcov: ["sex_F"]
    mixture: "~ age_wk + age_wk2" 
    random: 
      - "~ 1"
      - "~ age_wk"
      - "~ age_wk + age_wk2"
    idiag: [FALSE, TRUE]
    nwg: [FALSE, TRUE]
    ng_max: 5
  labels:
    oc_name: "Body Fat"
    oc_units: "(g)"
    age_var_name: "Age"
    age_var_units: "(weeks)"
    data_name: "SLAM Body Fat"
  harmonize:
    execute: TRUE
    formula: "~ age_wk + age_wk2 + sex + (1|idno)"
    variable: "cohort"

- name: "slam"
  path: "../00b_dataset_mods/output/slam_c1-c10/data/slam_gluc_og_HET3.csv"
  outcome: "gluc"
  model:
    fixed: "~ age_wk + age_wk2 + sex_F"
    fixcov: ["sex_F"]
    mixture: "~ age_wk + age_wk2" 
    random: 
      - "~ 1"
      - "~ age_wk"
      - "~ age_wk + age_wk2"
    idiag: [FALSE, TRUE]
    nwg: [FALSE, TRUE]
    ng_max: 5
  labels:
    oc_name: "Glucose"
    oc_units: "(mg/dL)"
    age_var_name: "Age"
    age_var_units: "(weeks)"
    data_name: "SLAM Glucose"
  harmonize:
    execute: TRUE
    formula: "~ age_wk + age_wk2 + sex + (1|idno)"
    variable: "cohort"
