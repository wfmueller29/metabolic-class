out_tag: fb6
tag_time: FALSE
plan: multicore
ncpus: 10
sample_n: FALSE
center: TRUE
scale: FALSE
external_validate: FALSE
custom_palette: TRUE
palette_colors: ["black", "#DF536B", "#61D04F", "midnightblue",
  "#28E2E5", "#CD0BBC"]
legend_labels: ["Early Peak BW", "Late Peak BW", "Low BW", "High-fat",
  "Low-fat", "Stable Glucose"]
custom_palette_train: FALSE
palette_colors_train: [ "black", "#DF536B", "#61D04F", "midnightblue",
  "#28E2E5", "#CD0BBC", "#FF991C", "gray62" ]
legend_labels_train: [ "Overweight", "Low-weight", "Mid-Weight", "High-fat",
  "Low-fat", "Mid-fat", "Decline Glucose", "Stable Glucose" ]
survival_dataset:
  path: "../00c_survival_data/output/slam_c1-c10/data/main_cat_surv.csv"
  id: "idno"
  age_death: "le_wk"
  event: "dead_censor"
individual_cox:
  - "~ Class" 
  - "~ Class" 
  - "~ Class" 
combined_cox:
  forms:
    - "~ <class+>"
    - "~ <probs+> + frailty(idno)"
    - "~ <probs+>"
  tts:
    - NULL
    - NULL
    - NULL
prediction_data:
  filter_interval:
    intervals:
      - [age_wk_ns: "(0, 57.50)"]
      - [age_wk_ns: "[57.50,86.25)"]
      - [age_wk_ns: "[86.25,103.50)"]
      - [age_wk_ns: "[103.50,Inf)"]
      - [age_wk_ns: "[57.50,103.50]"]
    names:
  filter_window:
    age_var: "age_wk"
    start: 6.5 # 1.5 months
    end: 143.4 # 33 months
    window_size_vector: [26.1, 39.1, 52.1] # 6, 9, 12 months
    step: 13 # 3 months
  filter_cumulative:
    age_var: "age_wk"
    start_vector: [6.5, 19.6, 32.6, 45.62] #1.5, 4.5, 7.5, 10.5 months
    end: 143.4 # 33 months
    step: 13 # 3 months
  resample:
    age_var: "age_wk"
    fraction_vector: [.75, .667, .5, .337, .25]
meta_dataset:
  id: "idno"
  age_var: ["age_wk", "age_wk2"] # these must be in increasing polynomial order
  covariates: NULL
  covariates_dummy: NULL
  factor: ["cohort"]
  train_test:
    sample_by: NULL
    split: .8
datasets:
- name: "slam"
  path: "../00b_dataset_mods/output/slam_c1-c10/data/slam_bw_F_B6.csv"
  outcome: "bw"
  model:
    fixed: "~ age_wk + age_wk2"
    fixcov: ["sex_F", "strain_HET3"]
    mixture: "~ age_wk + age_wk2" 
    random: 
      - "~ 1"
      - "~ age_wk"
      - "~ age_wk + age_wk2"
    idiag: [FALSE, TRUE]
    nwg: [FALSE, TRUE]
    ng_max: 5
  labels:
    oc_name: "Body Weight"
    oc_units: "(g)"
    age_var_name: "Age"
    age_var_units: "(weeks)"
    data_name: "SLAM Body Weight"
  harmonize:
    execute: TRUE
    formula: "~ age_wk + age_wk2 + (1|idno)"
    variable: "cohort"

- name: "slam"
  path: "../00b_dataset_mods/output/slam_c1-c10/data/slam_fat_F_B6.csv"
  outcome: "fat"
  model:
    fixed: "~ age_wk + age_wk2"
    mixture: "~ age_wk + age_wk2" 
    random: 
      - "~ 1"
      - "~ age_wk"
      - "~ age_wk + age_wk2"
    idiag: [FALSE, TRUE]
    nwg: [FALSE, TRUE]
    ng_max: 5
  labels:
    oc_name: "Body Fat"
    oc_units: "(g)"
    age_var_name: "Age"
    age_var_units: "(weeks)"
    data_name: "SLAM Body Fat"
  harmonize:
    execute: TRUE
    formula: "~ age_wk + age_wk2 + (1|idno)"
    variable: "cohort"

- name: "slam"
  path: "../00b_dataset_mods/output/slam_c1-c10/data/slam_gluc_F_B6.csv"
  outcome: "gluc"
  model:
    fixed: "~ age_wk + age_wk2"
    fixcov: ["sex_F", "strain_HET3"]
    mixture: "~ age_wk + age_wk2" 
    random: 
      - "~ 1"
      - "~ age_wk"
      - "~ age_wk + age_wk2"
    idiag: [FALSE, TRUE]
    nwg: [FALSE, TRUE]
    ng_max: 5
  labels:
    oc_name: "Glucose"
    oc_units: "(mg/dL)"
    age_var_name: "Age"
    age_var_units: "(weeks)"
    data_name: "SLAM Glucose"
  harmonize:
    execute: TRUE
    formula: "~ age_wk + age_wk2 + (1|idno)"
    variable: "cohort"
