out_tag: xslam_c9-c10
tag_time: FALSE
plan: multicore
ncpus: 10
sample_n: FALSE
center: TRUE
scale: FALSE
external_validate: "../05_figures/output/all.yaml"
custom_palette: TRUE
palette_colors: ["black", "#DF536B", "#61D04F", "midnightblue",
  "#28E2E5", "#CD0BBC", "#FF991C", "gray62"]
legend_labels: ["Overweight", "Low-weight", "Mid-Weight", "High-fat",
  "Low-fat", "Mid-fat", "Decline Glucose", "Stable Glucose"]
custom_palette_train: TRUE
palette_colors_train: [ "black", "#DF536B", "#61D04F", "midnightblue",
  "#28E2E5", "#CD0BBC", "#FF991C", "gray62" ]
legend_labels_train: [ "Overweight", "Low-weight", "Mid-Weight", "High-fat",
  "Low-fat", "Mid-fat", "Decline Glucose", "Stable Glucose" ]
survival_dataset:
  path: "../00c_survival_data/output/main_cat_surv.csv"
  id: "idno"
  age_var: "age_wk"
  age_death: "le_wk"
  event: "dead_censor"
  tod: "tod"
  covariates: "sex_M + strain_HET3"
datasets:
- name: "slam"
  path: "../x01_external_validation/data/slam_bw_ext.csv"
  outcome: "bw"
  age_var: ["age_wk", "age_wk2"] # these must be in increasing polynomial order
  id: "idno"
  covariates: ["sex", "strain"]
  covariates_dummy: ["sex_M", "strain_HET3"]
  factor: ["cohort"]
  train_test:
    sample_by: ["sex", "strain"]
    split: .8
  model:
    fixed: "~ age_wk + age_wk2 + sex_F * strain_HET3"
    fixcov: ["sex_F", "strain_HET3"]
    mixture: "~ age_wk + age_wk2" 
    random: 
      - "~ 1"
      - "~ age_wk"
      - "~ age_wk + age_wk2"
    idiag: [FALSE, TRUE]
    nwg: [FALSE, TRUE]
    ng_max: 5
  prediction_data:
    filter_interval:
      intervals:
        - [age_wk_ns: "(0, 57.50)"]
        - [age_wk_ns: "[57.50,86.25)"]
        - [age_wk_ns: "[86.25,103.50)"]
        - [age_wk_ns: "[103.50,Inf)"]
        - [age_wk_ns: "[57.50,103.50]"]
      names:
    filter_window:
      age_var: "age_wk"
      start: 0
      end: 165
      window_size_vector: 52.1429
      step: 10
    filter_cumulative:
      age_var: "age_wk"
      start_vector: 0
      end: 165
      step: 10
    resample:
      age_var: "age_wk"
      fraction_vector: [.75, .667, .5, .337, .25]
  labels:
    oc_name: "Body Weight"
    oc_units: "(g)"
    age_var_name: "Age"
    age_var_units: "(weeks)"
    data_name: "SLAM Body Weight"
  harmonize:
    execute: TRUE
    formula: "~ age_wk + age_wk2 + sex * strain + (1|idno)"
    variable: "cohort"

